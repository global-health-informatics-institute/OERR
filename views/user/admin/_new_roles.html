<div class="tab" id="user-roles">
    <!--TODO: move user roles to configurable -->
    <div class="title-div">User Role</div>
    <ul>
        {% for role_dict in user_roles.roles %}
            {% set role_name = role_dict.keys() | list | first %}
            <li>
                <input type="radio" id="{{ role_name | replace(' ', '_') }}" value="{{ role_name }}" name="role" onchange="SetParentRole()">
                <label for="{{ role_name | replace(' ', '_') }}">{{ role_name }}</label>
                <div class="check"></div>
            </li>
        {% endfor %}
    </ul>
</div>

<script type="text/javascript">
    // DATA VALIDATION
    const roleInputsContainer = document.getElementById("user-roles");
    
    function _validateRoleSelection() {
        const isRoleSelected = document.querySelector("input[name='role']:checked") !== null;
        setTabValidity(1, isRoleSelected); 
        

        const activeTab = _getCurrentActiveTab();
        if (activeTab) {
            _handleButtonsState(activeTab.index);
        }
    }
    if (roleInputsContainer) {
        roleInputsContainer.addEventListener('change', _validateRoleSelection);
        _validateRoleSelection();
    }

    // set parent role
    function _map_designations_to_role(role) {
        // select all li elements with data-id attribute == role
        const designationOptions = document.querySelectorAll("li[data-id='" + role + "']");
        const allDesignationOptions = document.getElementsByName("designationOptions");
        allDesignationOptions.forEach(option => {
            option.style.display = "none";
        });
        designationOptions.forEach(option => {
            option.style.display = "block";
        });
    }

    function SetParentRole() {
        setTabValidity(2, false);
        _handleButtonsState(2);
        const selectedRole = document.querySelector("input[name='role']:checked");
        const roleId = selectedRole.id;
        const roleValue = selectedRole.value;
        console.log("Selected role: " + roleId);
        _map_designations_to_role(roleId);
        
        // Check if Nurse role is selected
        if (roleValue === 'Nurse') {
            isNurseRole = true;
            console.log("Nurse role selected - allocation tab will be skipped");
            
            // Enable hidden inputs for nurse (no allocation)
            const nurseTeamInput = document.getElementById('nurse-team-input');
            const nurseUnitInput = document.getElementById('nurse-unit-input');
            if (nurseTeamInput) nurseTeamInput.disabled = false;
            if (nurseUnitInput) nurseUnitInput.disabled = false;
            
            // Disable radio inputs for team/unit selection
            const teamRadios = document.querySelectorAll("input[type='radio'][name='team']");
            const unitRadios = document.querySelectorAll("input[type='radio'][name='unit']");
            
            teamRadios.forEach(input => {
                input.checked = false;
                input.disabled = true;
            });
            unitRadios.forEach(input => {
                input.checked = false;
                input.disabled = true;
            });
            
            // Auto-validate allocation tab for nurses
            setTabValidity(3, true);
        } else {
            isNurseRole = false;
            
            // Disable hidden nurse inputs
            const nurseTeamInput = document.getElementById('nurse-team-input');
            const nurseUnitInput = document.getElementById('nurse-unit-input');
            if (nurseTeamInput) nurseTeamInput.disabled = true;
            if (nurseUnitInput) nurseUnitInput.disabled = true;
            
            // Enable radio inputs for team/unit selection
            const teamRadios = document.querySelectorAll("input[type='radio'][name='team']");
            const unitRadios = document.querySelectorAll("input[type='radio'][name='unit']");
            
            teamRadios.forEach(input => {
                input.disabled = false;
            });
            unitRadios.forEach(input => {
                input.disabled = false;
            });
            
            // Reset allocation tab validation for non-nurse roles
            setTabValidity(3, false);
            // Trigger validation check
            if (typeof _validateAllocationSelection === 'function') {
                _validateAllocationSelection();
            }
        }
    }

</script>
