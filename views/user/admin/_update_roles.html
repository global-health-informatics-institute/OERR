<div class="tab" id="edit-user-roles">
    <div class="title-div">User Role</div>
    <ul>
        {% for role_dict in user_roles.roles %}
            {% set role_name = role_dict.keys() | list | first %}
            {% if user.role == role_name %}
                <li>
                    <input type="radio" id="edit_{{ role_name | replace(' ', '_') }}" value="{{ role_name }}" name="role" onchange="editSetParentRole()" checked>
                    <label for="edit_{{ role_name | replace(' ', '_') }}">{{ role_name }}</label>
                    <div class="check"></div>
                </li>
            {% else %}
                <li>
                    <input type="radio" id="edit_{{ role_name | replace(' ', '_') }}" value="{{ role_name }}" name="role" onchange="editSetParentRole()">
                    <label for="edit_{{ role_name | replace(' ', '_') }}">{{ role_name }}</label>
                    <div class="check"></div>
                </li>
            {% endif %}
        {% endfor %}
    </ul>
</div>

<script type="text/javascript">
    function _mapEditDesignationsToRole(role) {
        const designationOptions = document.querySelectorAll("li[data-id='" + role + "']");
        const allDesignationOptions = document.getElementsByName("designationOptions");

        Array.from(allDesignationOptions).forEach(option => {
            option.style.display = "none";
        });

        designationOptions.forEach(option => {
            option.style.display = "block";
        });
    }

    function _uncheckAllDesignations() {
        const allDesignationOptions = document.getElementsByName("designation");
        allDesignationOptions.forEach(option => {
            option.checked = false;
        });
    }

    function _checkFirstDesignationForRole(role){
        const designationOptions = document.querySelectorAll("li[data-id='" + role + "'] input[name='designation']");
        if (designationOptions.length > 0) {
            designationOptions[0].checked = true;
        }
    }

    function editSetParentRole() {
        const selectedRole = document.querySelector("input[name='role']:checked");
        const roleId = selectedRole.id;
        const roleValue = selectedRole.value;
        console.log("Selected role: " + roleId);
        _uncheckAllDesignations();
        _mapEditDesignationsToRole(roleId);
        _checkFirstDesignationForRole(roleId);
        
        // Check if Nurse role is selected
        if (roleValue === 'Nurse') {
            isEditNurseRole = true;
            console.log("Nurse role selected - allocation tab will be skipped");
            
            // Enable hidden inputs for nurse (no allocation)
            const nurseTeamInput = document.getElementById('edit-nurse-team-input');
            const nurseUnitInput = document.getElementById('edit-nurse-unit-input');
            if (nurseTeamInput) nurseTeamInput.disabled = false;
            if (nurseUnitInput) nurseUnitInput.disabled = false;
            
            // Disable radio inputs for team/unit selection
            const teamRadios = document.querySelectorAll("input[type='radio'][name='team']");
            const unitRadios = document.querySelectorAll("input[type='radio'][name='unit']");
            
            teamRadios.forEach(input => {
                input.checked = false;
                input.disabled = true;
            });
            unitRadios.forEach(input => {
                input.checked = false;
                input.disabled = true;
            });
        } else {
            isEditNurseRole = false;
            
            // Disable hidden nurse inputs
            const nurseTeamInput = document.getElementById('edit-nurse-team-input');
            const nurseUnitInput = document.getElementById('edit-nurse-unit-input');
            if (nurseTeamInput) nurseTeamInput.disabled = true;
            if (nurseUnitInput) nurseUnitInput.disabled = true;
            
            // Enable radio inputs for team/unit selection
            const teamRadios = document.querySelectorAll("input[type='radio'][name='team']");
            const unitRadios = document.querySelectorAll("input[type='radio'][name='unit']");
            
            teamRadios.forEach(input => {
                input.disabled = false;
            });
            unitRadios.forEach(input => {
                input.disabled = false;
            });
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        const selectedRole = document.querySelector("input[name='role']:checked");
        const roleId = selectedRole.id;
        _mapEditDesignationsToRole(roleId);
        
        // Check if current user is a Nurse and set the flag
        if (selectedRole.value === 'Nurse') {
            isEditNurseRole = true;
            // Enable hidden inputs for existing nurses
            const nurseTeamInput = document.getElementById('edit-nurse-team-input');
            const nurseUnitInput = document.getElementById('edit-nurse-unit-input');
            if (nurseTeamInput) nurseTeamInput.disabled = false;
            if (nurseUnitInput) nurseUnitInput.disabled = false;
            
            // Disable allocation inputs for nurses
            const teamRadios = document.querySelectorAll("input[type='radio'][name='team']");
            const unitRadios = document.querySelectorAll("input[type='radio'][name='unit']");
            teamRadios.forEach(input => input.disabled = true);
            unitRadios.forEach(input => input.disabled = true);
        }
    });
</script>
