<!-- TODO: move user allocations to configurable -->
<div class="tab" id="user-allocations">
    <h2>Allocation</h2>
    <ul>
        {% for team in teams %}
            <li data-id="{{ team | replace(' ', '_')}}" name="allocationOptions">
                <input type="radio" id="{{ team | replace(' ', '_') }}" value="{{ team }}" name="wardAllocation" >
                <label for="{{ team | replace(' ', '_') }}">{{ team }}</label>
                <div class="check"></div>
            </li>
        {% endfor %}
        {% for unit in units %}
            <li data-id="{{ unit | replace(' ', '_')}}" name="allocationOptions">
                <input type="radio" id="{{ unit | replace(' ', '_') }}" value="{{ unit }}" name="wardAllocation" >
                <label for="{{ unit | replace(' ', '_') }}">{{ unit }}</label>
                <div class="check"></div>
            </li>
        {% endfor %}
    </ul>
</div>

<script type="text/javascript">
    // DATA VALIDATION
    const allocationInputsContainer = document.getElementById("user-allocations");
    
    function _validateAllocationSelection() {
        const isAllocationSelected = document.querySelector("input[name='wardAllocation']:checked") !== null;
        setTabValidity(3, isAllocationSelected); 
        

        const activeTab = _getCurrentActiveTab();
        if (activeTab) {
            _handleButtonsState(activeTab.index);
        }
    }
    if (allocationInputsContainer) {
        allocationInputsContainer.addEventListener('change', _validateAllocationSelection);
        _validateAllocationSelection();
    }
</script>
