<div class="tab">
    <div class="title-div" id="user-details">
        User Details
    </div>
    
    <div class="label-div">
        <label for="default">
            Full Name
        </label>
    </div>
    <input
        type="text"
        placeholder="Full name"
        name="name"
        minlength="6"
        id="default"
        class="input"
        value="{{request.form.lname }}"
        required
    >
    <div class="warning-div name-warning-div">
    </div>

    <div class="label-div username-div">
        Username
    </div>
    <input
        type="text"
        placeholder="Username"
        minlength="6"
        name="username"
        id="input-username"
        class="input lowercase"
        value="{{request.form.username }}"
        onchange="this.value.toLowerCase()"
        required
    >
    <div class="warning-div username-warning-div">
    </div>

    <div class="label-div">
        Password
    </div>
    <div style="position: relative;">
        <input
            type="password"
            placeholder="Password"
            name="password"
            minlength="6"
            id="input-password"
            class="input"
            value="{{ request.form.password }}"
            required
        >
        <span class="password-toggle" onclick="togglePasswordVisibility(this)" style="padding-left: 5px;">&#x1f441;</span>
    </div>
    <div class="warning-div password-warning-div">
    </div>



    <div class="label-div">
        Confirm Password
    </div>
    <input
        type="password"
        placeholder="Confirm Password"
        name="confirm_password"
        minlength="6"
        id="input-password-confirm"
        class="input"
        value="{{ request.form.confirm_password }}"
        required
    >
    <div class="warning-div confirm-password-warning-div">
    </div>


    <!-- Keyboard -->
    <div class="simple-keyboard" style="width: 99%; border: 1px solid silver;margin-top: 2vh;"></div>
</div>

<script type="text/javascript">
    // DATA VALIDATION
    const allImportantInputs = [
        {
            index: 0, element: document.querySelector("input[name='name']"),
            minLength: document.querySelector("input[name='name']").getAttribute("minlength"),
            warningDiv: document.querySelector(".name-warning-div")
        },
        {
            index: 1, element: document.querySelector("input[name='username']"),
            minLength: document.querySelector("input[name='username']").getAttribute("minlength"),
            warningDiv: document.querySelector(".username-warning-div")
        },
        {
            index: 2, element: document.querySelector("input[name='password']"),
            minLength: document.querySelector("input[name='password']").getAttribute("minlength"),
            warningDiv: document.querySelector(".password-warning-div")
        },
        {
            index: 3, element: document.querySelector("input[name='confirm_password']"),
            minLength: document.querySelector("input[name='confirm_password']").getAttribute("minlength"),
            warningDiv: document.querySelector(".confirm-password-warning-div")
        }
    ];

    function _userCheckValidity(index) {
        const item = allImportantInputs[index];
        if (!item) return false;

        const el = item.element;
        const warn = item.warningDiv || null;
        const min = parseInt(item.minLength, 10) || 0;
        const val = (el?.value || "").trim();

        const pwd = document.querySelector("input[name='password']");
        const confirm = document.querySelector("input[name='confirm_password']");
        const pwdVal = (pwd?.value || "").trim();
        const confVal = (confirm?.value || "").trim();

        // base length check
        let isValid = val.length >= min;

        // only consider "mismatch" if both fields have values
        const bothFilled = pwd && confirm && pwdVal !== "" && confVal !== "";
        const mismatch = bothFilled && pwdVal !== confVal;

        let message = "";

        if (!isValid) {
            message = `Minimum length is ${min}`;
        } else if (mismatch && el === confirm) {
            // show mismatch only on confirm field
            message = "Passwords do not match";
            isValid = false;
        } else {
            // cleared state (either valid length, or mismatch handled on confirm)
            message = "";
            // if password meets length but confirm exists and mismatches,
            // keep overall invalid but do not show message on password field
            if (mismatch && el === pwd) {
                isValid = false; // prevent progression but don't show message here
            }
        }

        if (warn) warn.textContent = message;
        return isValid;
    }

    function _userCheckAllValidity() {
        let isValid = true;
        allImportantInputs.forEach(input => {
            isValid = isValid && _userCheckValidity(input.index);
        });
        console.log("All inputs valid:", isValid);
        return isValid;
    }


    // Validate all important inputs
    let previousValues = allImportantInputs.map(input => input.element.value);

    setInterval(() => {
        allImportantInputs.forEach((input, index) => {
            const currentValue = input.element.value;
            if (currentValue !== previousValues[index]) {
                previousValues[index] = currentValue;
                _userCheckValidity(index);
                if (_userCheckAllValidity()) {
                    setTabValidity(0, true);
                    _handleButtonsState(0);
                } else {
                    setTabValidity(0, false);
                    _handleButtonsState(0);
                }
            }
        });
    }, 100);

    // TOGGLE PASSWORD VISIBILITY
    function togglePasswordVisibility(toggleElement) {
        const passwordInput = toggleElement.previousElementSibling;
        if (passwordInput.type === "password") {
            passwordInput.type = "text";
            toggleElement.innerHTML = "&#x1f441;&#xFE0E;"; // Open eye icon
        } else {
            passwordInput.type = "password";
            toggleElement.innerHTML = "&#x1f441;"; // Closed eye icon
        }
    }
    
</script>
